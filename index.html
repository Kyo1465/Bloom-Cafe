<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Cafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="reset.css">
</head>
<body>
    <header id="header" class="header">
        <div class="container header__container">

            <nav class="header__nav">
                <button class="header__nav-btn">
                    <span></span>
                </button>
                <ul>
                    <li class="header__nav-item"><a href="#header">Home</a></li>
                    <li class="header__nav-item"><a href="#">About us</a></li>
                    <li class="header__nav-item"><a href="#">Our products</a></li>
                    <li class="header__nav-item"><a href="#footer">Contacts</a></li>
                </ul>
            </nav>
            
        </div>
    </header>
    <section class="hero">
        <div class="container hero__container">
            <div class="hero__content">
                <p class="hero__main-text">Enjoy your <span class="active">Coffee</span> before your activity with</p>
                <h2 class="hero__title"><span class="active">Bloom Cafe</span></h2>
                <p class="hero__text">
                    <img src="images/map.svg" style="width: 30px; height: 30px; margin-right: 5px;" alt="Map Icon">
                    Jl. Raya Bogor Km. 33, Cimanggis, Depok
                </p>
            </div>

            <div class="hero__image">
                <img src="images/hero-img.png" alt="Coffee Image" style="width: 500px; height: 500px;">
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
